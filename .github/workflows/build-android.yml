name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Create gradlew if not exists
        run: |
          if [ ! -f gradlew ]; then
            echo "Creating gradle wrapper..."
            mkdir -p gradle/wrapper
            cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
            chmod +x gradlew
          fi

      - name: Build Debug APK
        run: |
          cd $GITHUB_WORKSPACE
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: |
          cd $GITHUB_WORKSPACE
          ./gradlew assembleRelease --no-daemon --stacktrace || true

      - name: Find APK files
        run: |
          find . -name "*.apk" -type f
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: racing-game-apk
          path: output/*.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Racing Game APK v1.0.${{ github.run_number }}"
          body: |
            ## 🏎️ Console Racing Game - Android APK

            Download and install the APK on your Android device:

            1. Download the APK file from the assets below
            2. Enable "Install from unknown sources" in your phone settings
            3. Open the APK file to install
            4. Enjoy the game!

            ### Controls
            - **Touch & Drag** left/right to steer
            - **N2O button** for nitro boost
            - **Pause button** (||) in top-right corner
            - Avoid red cars, purple cars, and orange trucks
            - Collect gold coins for bonus points!
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
