name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Find APK files
        run: |
          find . -name "*.apk" -type f
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: racing-game-apk
          path: output/*.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Racing Game APK v1.0.${{ github.run_number }}"
          body: |
            ## Racing Game - Android APK

            Download and install the APK on your Android device:

            1. Download the APK file from the assets below
            2. Enable "Install from unknown sources" in your phone settings
            3. Open the APK file to install
            4. Enjoy the game!

            ### Controls
            - Touch & Drag left/right to steer
            - N2O button for nitro boost
            - Pause button (||) in top-right corner
            - Avoid red cars, purple cars, and orange trucks
            - Collect gold coins for bonus points!
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
